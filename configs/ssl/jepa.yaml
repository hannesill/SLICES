# @package ssl
# JEPA (Joint-Embedding Predictive Architecture) SSL Configuration
#
# Observation-level tokenization: same masking as MAE, but predicts
# latent representations (d_model vectors) instead of raw input values.
# Uses EMA target encoder for stable training targets.
#
# Key difference from MAE: latent-space prediction (not input-space)
# Key difference from Contrastive: local positional prediction (not global invariance)

name: jepa

# Masking parameters
mask_ratio: 0.5  # Experiment plan default (ablate over 0.3/0.5/0.75)
mask_strategy: block  # "block" for contiguous segments, "random" for per-timestep
mask_n_blocks: 3  # Number of contiguous blocks (only for block strategy)

# Predictor parameters — bottlenecked relative to encoder (50% d_model).
# Unlike MAE decoder (which reconstructs raw features, d_model→D), JEPA predictor
# predicts in latent space (d_model→d_model). The bottleneck forces information
# routing through the online encoder's context representations.
predictor_d_model: 32   # 50% of encoder d_model=64
predictor_n_layers: 2
predictor_n_heads: 4    # 32/4 = 8 per head
predictor_d_ff: 128     # 4 * predictor_d_model
predictor_dropout: 0.1

# Momentum encoder parameters
# Target encoder updated via EMA: target = m * target + (1-m) * online
# Momentum increases linearly from base to final during training
momentum_base: 0.999
momentum_final: 1.0

# Loss type: mse or cosine
loss_type: mse
