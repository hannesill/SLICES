# @package ssl
# MAE (Masked Autoencoder) SSL Configuration
#
# Timestep-level tokenization: each token = one hourly timestep containing all
# features plus the observation mask via the encoder's obs-aware projection.
# The encoder processes only visible timesteps; the decoder reconstructs masked
# timestep features from the remaining context.

name: mae

# Masking parameters
mask_ratio: 0.5  # Experiment plan default (ablate over 0.3/0.5/0.75)

# Decoder parameters (matches encoder d_model)
decoder_d_model: 64   # Decoder hidden dimension (= encoder d_model)
decoder_n_layers: 2   # Number of decoder transformer layers
decoder_n_heads: 4    # Number of decoder attention heads
decoder_d_ff: 256     # Decoder feedforward dimension (4 * decoder_d_model)
decoder_dropout: 0.1
