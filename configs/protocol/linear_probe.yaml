# @package _global_
# Linear probe: frozen encoder, linear head, representation-quality evaluation.

protocol: linear_probe

training:
  freeze_encoder: true
  max_epochs: 50
  early_stopping_patience: 10

optimizer:
  lr: 1.0e-4

scheduler:
  T_max: ${training.max_epochs}

task:
  head_type: linear
  hidden_dims: []
  dropout: 0.0
