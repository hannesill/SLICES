# @package encoder
# GRU-D Encoder Configuration
#
# GRU-D (Che et al. 2018) is a standard RNN baseline for clinical time series
# with missing data. Uses learnable decay to handle missingness natively.
# No EncoderWithMissingToken wrapper needed.

name: gru_d
d_model: 64
n_layers: 1
n_gru_layers: 1
dropout: 0.1
max_seq_length: 168
