# @package task
# 24-hour mortality prediction (binary classification)
# Predict if patient will die within 24h after the observation window
#
# Timeline: |---- observation (48h) ----|---- prediction (24h) ----|
#           intime                    obs_end                   pred_end

task_name: mortality_24h
task_type: binary
n_classes: null
observation_window_hours: 48  # must match seq_length_hours
prediction_window_hours: 24
gap_hours: 0
head_type: mlp
hidden_dims: [64]
dropout: 0.3
activation: relu
use_layer_norm: false
projection_dim: null
