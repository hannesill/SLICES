# @package task
# AKI prediction using KDIGO criteria (binary classification)
# Predict if patient will develop acute kidney injury after the 24h observation window

task_name: aki_kdigo
task_type: binary
observation_window_hours: 24
prediction_window_hours: 24
gap_hours: 0
label_sources:
  - stays
  - timeseries
label_params:
  creatinine_col: crea
  baseline_window_hours: 24
  absolute_rise_threshold: 0.3
  relative_rise_threshold: 1.5
  relative_window_hours: 168
quality_checks:
  # AKI is evaluated on the creatinine-observed filtered cohort. eICU has
  # materially higher missingness than MIMIC, so warn only above the current
  # expected cross-dataset envelope.
  max_missing_percentage: 35.0
primary_metric: auprc
n_classes: null
head_type: mlp
hidden_dims: [64]
dropout: 0.3
activation: relu
use_layer_norm: false
projection_dim: null
