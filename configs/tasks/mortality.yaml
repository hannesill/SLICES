# @package task
# ICU mortality prediction (binary classification)
# Predict if patient will die during the remainder of the ICU stay after the 24h observation window

task_name: mortality
task_type: binary
observation_window_hours: 24
prediction_window_hours: -1
gap_hours: 0
label_sources:
  - stays
  - mortality_info
label_params: {}
primary_metric: auprc
n_classes: null
head_type: mlp
hidden_dims: [64]
dropout: 0.3
activation: relu
use_layer_norm: false
projection_dim: null
