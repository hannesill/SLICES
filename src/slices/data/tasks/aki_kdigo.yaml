task_name: aki_kdigo
task_type: binary
observation_window_hours: 24
prediction_window_hours: 24  # Look ahead 24h (hours 24-48) for AKI label
gap_hours: 0
label_sources:
  - stays
  - timeseries
label_params:
  creatinine_col: crea
  baseline_window_hours: 24  # Use full observation window for baseline
  absolute_rise_threshold: 0.3
  relative_rise_threshold: 1.5
  relative_window_hours: 168  # 7 days per KDIGO 2012 specification
quality_checks:
  # AKI is evaluated on the creatinine-observed filtered cohort. eICU has
  # materially higher missingness than MIMIC, so warn only above the current
  # expected cross-dataset envelope.
  max_missing_percentage: 35.0
primary_metric: auprc
additional_metrics:
  - auroc
n_classes: 2
class_names:
  - no_aki
  - aki
positive_class: aki
